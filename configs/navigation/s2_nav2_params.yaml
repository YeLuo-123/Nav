amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: base_link
    global_frame_id: map
    odom_frame_id: odom
    robot_model_type: nav2_amcl::OmniMotionModel
    scan_topic: /s2_lidar_slam/scan
    map_topic: /s2_lidar_slam/map
    laser_model_type: likelihood_field
    laser_likelihood_max_dist: 2.0
    laser_min_range: 0.25
    laser_max_range: 8.0
    max_beams: 180
    min_particles: 500
    max_particles: 3000
    pf_err: 0.05
    pf_z: 0.99
    sigma_hit: 0.2
    z_hit: 0.5
    z_rand: 0.5
    z_max: 0.05
    z_short: 0.05
    lambda_short: 0.1
    do_beamskip: false
    # Allow the filter to converge while the real robot remains stationary
    # after an approximate pose is supplied from RViz.
    update_min_d: 0.0
    update_min_a: 0.0
    resample_interval: 1
    transform_tolerance: 0.5
    tf_broadcast: true
    always_reset_initial_pose: true
    first_map_only: false

